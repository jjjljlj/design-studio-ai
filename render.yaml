services:
  - type: web
    name: design-studio-ai
    env: node
    plan: free
    buildCommand: ""
    startCommand: "node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5173
      - key: OPENAI_TEXT_MODEL
        value: gpt-5.5
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
