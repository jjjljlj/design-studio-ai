services:
  - type: web
    name: design-studio-ai
    env: node
    plan: free
    buildCommand: ""
    startCommand: "node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5173
      - key: TEXT_PROVIDER
        value: auto
      - key: IMAGE_PROVIDER
        value: auto
      - key: OPENAI_TEXT_MODEL
        value: gpt-5.5
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: DEEPSEEK_TEXT_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: QWEN_TEXT_MODEL
        value: qwen-plus
      - key: QWEN_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
      - key: QWEN_IMAGE_MODEL
        value: wanx2.1-t2i-turbo
      - key: QWEN_IMAGE_SIZE
        value: 1024*1536
      - key: TRYON_PROVIDER
        value: disabled
      - key: ALIYUN_TRYON_MODEL
        value: aitryon-plus
      - key: ALIYUN_TRYON_REGION
        value: cn-beijing
      - key: FASHN_TRYON_MODEL
        value: fal-ai/fashn/tryon/v1.5
      - key: TRYON_IMAGE_STORAGE
        value: manual
      - key: TRYON_IMAGE_URL_TTL_MINUTES
        value: 60
      - key: SUPABASE_TABLE
        value: design_records
